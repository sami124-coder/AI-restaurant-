services:
  - type: web
    name: ai-restaurant-manager
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_PATH
        value: /var/data/restaurant.db
    disk:
      name: restaurant-data
      mountPath: /var/data
      sizeGB: 1
