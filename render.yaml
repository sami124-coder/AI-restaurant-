services:
  - type: web
    name: ai-restaurant-manager
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_PATH
        value: /var/data/restaurant.db
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
      - key: OPENAI_REASONING_EFFORT
        value: high
      - key: OPENAI_TEXT_VERBOSITY
        value: high
      - key: OPENAI_MAX_OUTPUT_TOKENS
        value: "1600"
    disk:
      name: restaurant-data
      mountPath: /var/data
      sizeGB: 1
